# Render Blueprint — hosts the json-server mock API for the deployed frontend.
# The Vite app on Vercel talks to this service via its VITE_API_BASE_URL env var.
#
# Notes:
# - Free plan spins the service down after ~15 min of inactivity; the next
#   request cold-starts it (~30-60s). The frontend's Axios timeout was raised
#   to 30s to tolerate this.
# - The filesystem is ephemeral: writes to db.json persist only until the next
#   deploy/restart. Fine for a demo; add a Render Disk (paid) for persistence.
services:
  - type: web
    name: workflow-form-builder-api
    runtime: node
    plan: free
    buildCommand: npm install --production=false
    startCommand: npm start
    autoDeploy: true
